services:
  backend:
    build:
      context: .
      dockerfile: ./docker/backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./src/backend:/app
    environment:
      - PYTHONDONTWRITEBYTECODE=1 # pythonのキャッシュを作らないようにする(大量の同期が発生するため)
      - PYTHONUNBUFFERED=1
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: ./docker/frontend/Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./src/frontend:/app
    tty: true
    stdin_open: true

  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=secret_root_pass
      - MYSQL_DATABASE=seaweed_db
      - MYSQL_USER=seaweed_user
      - MYSQL_PASSWORD=seaweed_pass
    volumes:
      # 【変更】名前付きボリュームから、ホストの /docker/db/data へのマウントに変更
      - ./docker/db/data:/var/lib/mysql
      # 初期化SQL
      - ./docker/db/init.sql:/docker-entrypoint-initdb.d/init.sql